id: com.aether.app
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: Aether
finish-args:
  - --socket=wayland
  - --socket=x11
  - --share=ipc
  - --device=dri
  - --share=network
  - --filesystem=host
modules:
  - name: Aether
    buildsystem: simple
    build-commands:
      - install -Dm755 Aether /app/bin/Aether
      - install -Dm644 com.aether.app.desktop /app/share/applications/com.aether.app.desktop
      - install -Dm644 Aether.png /app/share/icons/hicolor/256x256/apps/com.aether.app.png
    sources:
      - type: file
        path: ../src-tauri/target/release/Aether
      - type: file
        path: Aether.desktop
        dest-filename: com.aether.app.desktop
      - type: file
        path: Aether.png
